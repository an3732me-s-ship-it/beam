<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Beam GLB Test</title>

  <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>

<body style="margin:0; overflow:hidden;">

  <a-scene embedded
           arjs="sourceType: webcam; debugUIEnabled: false; patternRatio: 0.7;">

    <!-- LIGHTING -->
    <a-entity light="type: ambient; intensity: 1.0;"></a-entity>
    <a-entity light="type: directional; intensity: 1.0;" position="1 2 1"></a-entity>

    <!-- MARKER -->
    <a-marker type="pattern" url="pattern-illum.patt">

      <!-- BEAM TEST -->
      <a-entity
        gltf-model="url(beam.glb)"
        position="0 -1 0"
        scale="50 50 50"
        rotation="90 0 0"
        material="color: white">
      </a-entity>

    </a-marker>

    <!-- CAMERA -->
    <a-entity camera></a-entity>

  </a-scene>

</body>
</html>
