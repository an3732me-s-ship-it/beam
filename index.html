<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>AR Beam Between Markers</title>

  <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <script>
    AFRAME.registerComponent('dynamic-beam', {
      init: function () {
        this.p1 = new THREE.Vector3();
        this.p2 = new THREE.Vector3();
        this.mid = new THREE.Vector3();
        this.dir = new THREE.Vector3();

        this.quat = new THREE.Quaternion();
        this.matrix = new THREE.Matrix4();
        this.up = new THREE.Vector3(0, 1, 0);

        // smoothing
        this.smoothPos = new THREE.Vector3();
        this.smoothQuat = new THREE.Quaternion();
      },

      tick: function () {
        const m1 = document.querySelector('#marker-illum');
        const m2 = document.querySelector('#marker-flow');
        const beam = document.querySelector('#beam');

        if (!m1 || !m2 || !beam) return;

        if (m1.object3D.visible && m2.object3D.visible) {

          // --- POSITIONS ---
          m1.object3D.getWorldPosition(this.p1);
          m2.object3D.getWorldPosition(this.p2);

          const distance = this.p1.distanceTo(this.p2);

          // --- MIDPOINT ---
          this.mid.addVectors(this.p1, this.p2).multiplyScalar(0.5);

          // --- DIRECTION ---
          this.dir.subVectors(this.p2, this.p1).normalize();

          // --- STABLE ROTATION (no twist) ---
          this.matrix.lookAt(this.p1, this.p2, this.up);
          this.quat.setFromRotationMatrix(this.matrix);

          // --- SMOOTHING ---
          this.smoothPos.lerp(this.mid, 0.2);
          this.smoothQuat.slerp(this.quat, 0.2);

          beam.object3D.position.copy(this.smoothPos);
          beam.object3D.quaternion.copy(this.smoothQuat);

          // --- NON-LINEAR SCALING ---
          const baseLength = 0.10; // 10 cm from Rhino model

          // length grows faster
          const lengthScale = Math.pow(distance / baseLength, 1.2);

          // preserve Rhino proportions (1 × 3 cm)
          const baseX = 0.01;
          const baseY = 0.03;

          // thickness grows slower
          const thicknessFactor = 0.5 + Math.pow(distance, 0.3);

          // boost for AR visibility
          const visualBoost = 3.0;

          beam.object3D.scale.set(
            baseX * thicknessFactor * visualBoost,
            baseY * thicknessFactor * visualBoost,
            lengthScale * visualBoost
          );

          beam.object3D.visible = true;

        } else {
          beam.object3D.visible = false;
        }
      }
    });

    // --- MATERIAL FIX + COLOR ---
    AFRAME.registerComponent('fix-material', {
      init: function () {
        this.el.addEventListener('model-loaded', () => {
          const mesh = this.el.getObject3D('mesh');
          if (!mesh) return;

          mesh.traverse((node) => {
            if (node.isMesh) {
              node.material.color.set('#8db396');
              node.material.roughness = 0.5;
              node.material.metalness = 0.1;
              node.material.transparent = false;

              // optional: slight glow feel
              node.material.emissive = new THREE.Color('#8db396');
              node.material.emissiveIntensity = 0.3;
            }
          });
        });
      }
    });
  </script>
</head>

<body style="margin:0; overflow:hidden;">
  <a-scene embedded
           arjs="sourceType: webcam; debugUIEnabled: false; patternRatio: 0.7;"
           dynamic-beam>

    <!-- LIGHTING -->
    <a-entity light="type: ambient; intensity: 0.9;"></a-entity>
    <a-entity light="type: directional; intensity: 1.2;" position="1 4 2"></a-entity>

    <!-- MARKER 1 -->
    <a-marker id="marker-illum" type="pattern" url="pattern-illum.patt">
      <a-box color="red" scale="0.2 0.2 0.2"></a-box>
    </a-marker>

    <!-- MARKER 2 -->
    <a-marker id="marker-flow" type="pattern" url="pattern-flow.patt">
      <a-box color="red" scale="0.2 0.2 0.2"></a-box>
    </a-marker>

    <!-- BEAM -->
    <a-entity id="beam"
              gltf-model="url(beam_w.glb)"
              fix-material
              visible="false">
    </a-entity>

    <a-entity camera></a-entity>
  </a-scene>
</body>
</html>
