<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Stable Rectangular Beam</title>

  <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <script>
    AFRAME.registerComponent('dynamic-beam', {
      init: function () {
        this.p1 = new THREE.Vector3();
        this.p2 = new THREE.Vector3();
        this.mid = new THREE.Vector3();
      },

      tick: function () {
        const m1 = document.querySelector('#marker-illum');
        const m2 = document.querySelector('#marker-flow');
        const beam = document.querySelector('#beam');

        if (!m1 || !m2 || !beam) return;

        if (m1.object3D.visible && m2.object3D.visible) {

          // --- GET POSITIONS ---
          m1.object3D.getWorldPosition(this.p1);
          m2.object3D.getWorldPosition(this.p2);

          const distance = this.p1.distanceTo(this.p2);

          // --- MIDPOINT ---
          this.mid.addVectors(this.p1, this.p2).multiplyScalar(0.5);
          beam.object3D.position.copy(this.mid);

          // --- THICKNESS (based on distance) ---
          const minT = 0.05;
          const maxT = 0.35;

          let thickness = 0.05 + distance * 0.12;
          thickness = Math.min(maxT, Math.max(minT, thickness));

          // --- RECTANGULAR SECTION ---
          const width = thickness * 0.5;
          const depth = thickness;

          // IMPORTANT: Y = length
          beam.object3D.scale.set(width, distance, depth);

          // --- SIMPLE STABLE ORIENTATION ---
          beam.object3D.lookAt(this.p2);
          beam.object3D.rotateX(Math.PI / 2);

          beam.object3D.visible = true;

        } else {
          beam.object3D.visible = false;
        }
      }
    });
  </script>
</head>

<body style="margin:0; overflow:hidden;">
  <a-scene embedded 
           arjs="sourceType: webcam; debugUIEnabled: false; patternRatio: 0.7;"
           dynamic-beam>

    <!-- LIGHT -->
    <a-entity light="type: ambient; intensity: 0.9;"></a-entity>
    <a-entity light="type: directional; intensity: 1.1;" position="1 4 2"></a-entity>

    <!-- MARKERS -->
    <a-marker id="marker-illum" type="pattern" url="pattern-illum.patt">
      <a-box color="#850909" scale="0.2 0.2 0.2" material="opacity: 0.5; transparent:true"></a-box>
    </a-marker>

    <a-marker id="marker-flow" type="pattern" url="pattern-flow.patt">
      <a-box color="#750808" scale="0.2 0.2 0.2" material="opacity: 0.5; transparent:true"></a-box>
    </a-marker>

    <!-- BEAM -->
    <a-box id="beam"
           color="#D1C0C0"
           width="1"
           height="1"
           depth="1"
           material="opacity: 0.95; transparent: true"
           visible="false">
    </a-box>

    <a-entity camera></a-entity>
  </a-scene>
</body>
</html>
