<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Dynamic Beam GLB</title>

  <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <script>
    <script>
AFRAME.registerComponent('dynamic-beam', {
  init: function () {
    this.p1 = new THREE.Vector3();
    this.p2 = new THREE.Vector3();
    this.mid = new THREE.Vector3();
    this.dir = new THREE.Vector3();
    this.quat = new THREE.Quaternion();
    this.up = new THREE.Vector3(0, 1, 0);
  },

  tick: function () {
    const m1 = document.querySelector('#marker-illum');
    const m2 = document.querySelector('#marker-flow');
    const beam = document.querySelector('#beam');

    if (!m1 || !m2 || !beam) return;

    if (m1.object3D.visible && m2.object3D.visible) {

      // --- POSITIONS ---
      m1.object3D.getWorldPosition(this.p1);
      m2.object3D.getWorldPosition(this.p2);

      const distance = this.p1.distanceTo(this.p2);

      // --- MIDPOINT ---
      this.mid.addVectors(this.p1, this.p2).multiplyScalar(0.5);
      beam.object3D.position.copy(this.mid);

      // --- DIRECTION ---
      this.dir.subVectors(this.p2, this.p1).normalize();

      // --- ROTATION (stable, no weird tilting) ---
      this.quat.setFromUnitVectors(this.up, this.dir);
      beam.object3D.quaternion.copy(this.quat);

      // --- SCALE ---
      const lengthScale = distance / 0.4; // 0.4m = original beam length

      // thickness grows with distance
      let thickness = 5 + distance * 10;

      // rectangular section
      const width = thickness;
      const depth = thickness * 0.5;

      beam.object3D.scale.set(width, lengthScale, depth);

      beam.object3D.visible = true;

    } else {
      beam.object3D.visible = false;
    }
  }
});
  </script>
</head>

<body style="margin:0; overflow:hidden;">
  <a-scene embedded 
           arjs="sourceType: webcam; debugUIEnabled: false; patternRatio: 0.7;"
           dynamic-beam>

    <!-- LIGHT -->
    <a-entity light="type: ambient; intensity: 0.9;"></a-entity>
    <a-entity light="type: directional; intensity: 1.0;" position="1 3 2"></a-entity>

    <!-- MARKER 1 -->
    <a-marker id="marker-illum" type="pattern" url="pattern-illum.patt">
      <a-box color="red" scale="0.2 0.2 0.2"></a-box>
    </a-marker>

    <!-- MARKER 2 -->
    <a-marker id="marker-flow" type="pattern" url="pattern-flow.patt">
      <a-box color="red" scale="0.2 0.2 0.2"></a-box>
    </a-marker>

    <!-- BEAM GLB -->
    <a-entity id="beam"
      gltf-model="url(beam.glb)"
      visible="false">
    </a-entity>

    <!-- CAMERA -->
    <a-entity camera></a-entity>

  </a-scene>
</body>
</html>
