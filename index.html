<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>AR Dynamic Beam - Final Calibration</title>

    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <script>
    AFRAME.registerComponent('dynamic-beam', {
        init: function () {
            this.p1 = new THREE.Vector3();
            this.p2 = new THREE.Vector3();
            this.mid = new THREE.Vector3();
            this.dir = new THREE.Vector3();
            this.quat = new THREE.Quaternion();
            this.axis = new THREE.Vector3(0, 0, 1);
            this.isDanger = false;
            this.hud = document.querySelector('#hud');
        },

        tick: function () {
            const m1 = document.querySelector('#marker-illum');
            const m2 = document.querySelector('#marker-flow');
            const mSwitch = document.querySelector('#marker-switch'); 
            const beam = document.querySelector('#beam');

            if (!m1 || !m2 || !beam) return;

            // --- 1. MODEL SELECTOR ---
            // Switch between beam_w and beam_s based on the 3rd marker
            let targetModel = (mSwitch && mSwitch.object3D.visible) ? "beam_s.glb" : "beam_w.glb";

            if (beam.getAttribute('gltf-model') !== targetModel) {
                beam.setAttribute('gltf-model', targetModel);
            }

            // --- 2. THE ENGINE ---
            if (m1.object3D.visible && m2.object3D.visible) {
                m1.object3D.getWorldPosition(this.p1);
                m2.object3D.getWorldPosition(this.p2);

                const actualDistance = this.p1.distanceTo(this.p2);

                // --- CALIBRATION SETTINGS ---
                const gapOffset = 0.06;      
                const sensitivity = 0.1;    
                const dangerThreshold = 2.0; // Adjusted based on your HUD screenshot
                // ----------------------------

                // HUD UPDATE
                if (this.hud) {
                    const statusText = actualDistance > dangerThreshold ? 
                        '<span style="color:#ff4444">DANGER</span>' : 
                        '<span style="color:#44ff44">SAFE</span>';
                    const activeModel = targetModel.includes("beam_s") ? "Model S" : "Model W";
                    this.hud.innerHTML = `Dist: ${actualDistance.toFixed(3)}<br>Model: ${activeModel}<br>Status: ${statusText}`;
                }

                // CALC LENGTH
                let beamLengthNeeded = actualDistance - gapOffset;
                if (beamLengthNeeded < 0) beamLengthNeeded = 0;
                const lengthScale = beamLengthNeeded / sensitivity;

                // TRANSFORM BEAM
                this.mid.addVectors(this.p1, this.p2).multiplyScalar(0.5);
                beam.object3D.position.copy(this.mid);
                
                this.dir.subVectors(this.p2, this.p1).normalize();
                this.quat.setFromUnitVectors(this.axis, this.dir);
                beam.object3D.quaternion.copy(this.quat);
                
                beam.object3D.rotateZ(Math.PI / 2); 
                beam.object3D.translateY(-0.02); // Your vertical alignment nudge

                // Thickness locked at 12x12
                beam.object3D.scale.set(12, 12, lengthScale);

                // COLOR LOGIC
                const shouldBeDanger = actualDistance > dangerThreshold;
                if (this.isDanger !== shouldBeDanger) {
                    this.isDanger = shouldBeDanger;
                    const mesh = beam.getObject3D('mesh');
                    if (mesh) {
                        mesh.traverse((node) => {
                            if (node.isMesh && node.material) {
                                node.material.color.set(this.isDanger ? '#ff0000' : '#8db396');
                            }
                        });
                    }
                }

                beam.object3D.visible = true;
            } else {
                if (this.hud) this.hud.innerHTML = "Searching for markers...";
                beam.object3D.visible = false;
            }
        }
    });

    AFRAME.registerComponent('fix-material', {
        init: function () {
            this.el.addEventListener('model-loaded', () => {
                const mesh = this.el.getObject3D('mesh');
                if (!mesh) return;
                mesh.traverse((node) => {
                    if (node.isMesh) {
                        node.material.color.set('#8db396');
                        node.material.roughness = 0.6;
                        node.material.metalness = 0.1;
                    }
                });
            });
        }
    });
    </script>
</head>

<body style="margin:0; overflow:hidden;">
    <!-- HUD -->
    <div id="hud" style="position: fixed; top: 10px; left: 10px; z-index: 999; 
                        background: rgba(0,0,0,0.8); color: white; padding: 10px; 
                        font-family: sans-serif; border-radius: 5px; pointer-events: none;">
        Initializing...
    </div>

    <a-scene embedded 
             arjs="sourceType: webcam; debugUIEnabled: false; patternRatio: 0.7;" 
             dynamic-beam>

        <a-entity light="type: ambient; intensity: 0.8;"></a-entity>
        <a-entity light="type: directional; intensity: 1.0;" position="1 4 2"></a-entity>

        <!-- BEAM MARKER 1 -->
        <a-marker id="marker-illum" type="pattern" url="pattern-beam2.patt">
            <a-box color="blue" scale="0.05 0.05 0.05"></a-box>
        </a-marker>

        <!-- BEAM MARKER 2 -->
        <a-marker id="marker-flow" type="pattern" url="pattern-beam1.patt">
            <a-box color="blue" scale="0.05 0.05 0.05"></a-box>
        </a-marker>

        <!-- SWITCHER MARKER -->
        <a-marker id="marker-switch" type="pattern" url="pattern-switch2.patt">
            <a-ring color="gold" radius-inner="0.04" radius-outer="0.06" rotation="-90 0 0"></a-ring>
        </a-marker>

        <!-- THE DYNAMIC BEAM -->
        <a-entity id="beam" 
                  gltf-model="beam_w.glb" 
                  fix-material 
                  visible="false">
        </a-entity>

        <a-entity camera></a-entity>
    </a-scene>
</body>
</html>
