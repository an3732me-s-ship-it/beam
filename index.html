<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Dynamic Scaling GLB Beam</title>

  <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <script>
 AFRAME.registerComponent('dynamic-beam', {
  init: function () {
    this.p1 = new THREE.Vector3();
    this.p2 = new THREE.Vector3();
    this.mid = new THREE.Vector3();
    this.dir = new THREE.Vector3();
    this.quat = new THREE.Quaternion();

    // Use the Z-axis as the length reference as confirmed by your working orientation
    this.axis = new THREE.Vector3(0, 0, 1);
  },

  tick: function () {
    const m1 = document.querySelector('#marker-illum');
    const m2 = document.querySelector('#marker-flow');
    const beam = document.querySelector('#beam');

    if (!m1 || !m2 || !beam) return;

    if (m1.object3D.visible && m2.object3D.visible) {
      // 1. GET POSITIONS
      m1.object3D.getWorldPosition(this.p1);
      m2.object3D.getWorldPosition(this.p2);

      // 2. CALCULATE DISTANCE
      const distance = this.p1.distanceTo(this.p2);

      // 3. POSITION AT MIDPOINT
      this.mid.addVectors(this.p1, this.p2).multiplyScalar(0.5);
      beam.object3D.position.copy(this.mid);

      // 4. ROTATION (Using your confirmed axis)
      this.dir.subVectors(this.p2, this.p1).normalize();
      this.quat.setFromUnitVectors(this.axis, this.dir);
      beam.object3D.quaternion.copy(this.quat);
      
      // Keeping your orientation fix from the screenshot version
      beam.object3D.rotateZ(Math.PI / 2);

      // 5. SCALE: INCREASE MULTIPLIER TO REACH MARKERS
      // We lock Width (X) and Height (Y) to keep the rectangular shape.
      // We multiply distance by 40 so the Z-axis length actually reaches the markers.
      const multiplier = 12; 
      beam.object3D.scale.set(12, 3, distance * multiplier);

      beam.object3D.visible = true;
    } else {
      beam.object3D.visible = false;
    }
  }
});

  AFRAME.registerComponent('fix-material', {
    init: function () {
      this.el.addEventListener('model-loaded', () => {
        const mesh = this.el.getObject3D('mesh');
        if (!mesh) return;

        mesh.traverse((node) => {
          if (node.isMesh) {
            node.material.color.set('#8db396');
            node.material.roughness = 0.6;
            node.material.metalness = 0.1;
            node.material.transparent = false;
          }
        });
      });
    }
  });
</script>
</head>

<body style="margin:0; overflow:hidden;">
  <a-scene embedded
           arjs="sourceType: webcam; debugUIEnabled: false; patternRatio: 0.7;"
           dynamic-beam>

    <!-- Balanced Lighting -->
    <a-entity light="type: ambient; intensity: 0.8;"></a-entity>
    <a-entity light="type: directional; intensity: 1.0;" position="1 4 2"></a-entity>

    <!-- Marker 1: Illumination Anchor -->
    <a-marker id="marker-illum" type="pattern" url="pattern-illum.patt">
      <a-box color="red" scale="0.1 0.1 0.1" opacity="0.5"></a-box>
    </a-marker>

    <!-- Marker 2: Flow Anchor -->
    <a-marker id="marker-flow" type="pattern" url="pattern-flow.patt">
      <a-box color="blue" scale="0.1 0.1 0.1" opacity="0.5"></a-box>
    </a-marker>

    <!-- The Beam Entity -->
    <a-entity id="beam"
              gltf-model="url(beam_w.glb)"
              fix-material
              visible="false">
    </a-entity>

    <a-entity camera></a-entity>
  </a-scene>
</body>
</html>
