<a-scene embedded 
         arjs="sourceType: webcam; debugUIEnabled: false; patternRatio: 0.7;">

  <!-- LIGHT -->
  <a-entity light="type: ambient; intensity: 1.0;"></a-entity>
  <a-entity light="type: directional; intensity: 1.0;" position="1 2 1"></a-entity>

  <!-- MARKER -->
  <a-marker type="pattern" url="pattern-illum.patt">

    <!-- FORCE SHOW BEAM -->
    <a-entity
      gltf-model="url(beam.glb)"
      position="0 0 0"
      scale="20 20 20"
      rotation="0 0 0">
    </a-entity>

  </a-marker>

  <a-entity camera></a-entity>
</a-scene>
