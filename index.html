<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>GLB Beam Between Markers</title>

  <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <script>
    AFRAME.registerComponent('dynamic-beam', {
      init: function () {
        this.p1 = new THREE.Vector3();
        this.p2 = new THREE.Vector3();
        this.mid = new THREE.Vector3();
      },

      tick: function () {
        const m1 = document.querySelector('#marker-illum');
        const m2 = document.querySelector('#marker-flow');
        const beam = document.querySelector('#beam');

        if (!m1 || !m2 || !beam) return;

        if (m1.object3D.visible && m2.object3D.visible) {

          // --- GET POSITIONS ---
          m1.object3D.getWorldPosition(this.p1);
          m2.object3D.getWorldPosition(this.p2);

          const distance = this.p1.distanceTo(this.p2);

          // --- MIDPOINT ---
          this.mid.addVectors(this.p1, this.p2).multiplyScalar(0.5);
          beam.object3D.position.copy(this.mid);

          // --- THICKNESS (scales with distance) ---
          const minT = 0.02;
          const maxT = 0.12;

          let thickness = minT + distance * 0.08;
          thickness = Math.min(maxT, Math.max(minT, thickness));

          const width = thickness * 0.5;
          const height = thickness;

          // --- SCALE ---
          // Z axis = length of beam
          beam.object3D.scale.set(width, height, distance);

          // --- ORIENTATION ---
          beam.object3D.lookAt(this.p2);

          // VERY IMPORTANT: align Rhino Z → A-Frame direction
          beam.object3D.rotateX(Math.PI / 2);

          beam.object3D.visible = true;

        } else {
          beam.object3D.visible = false;
        }
      }
    });
  </script>
</head>

<body style="margin:0; overflow:hidden;">
  <a-scene embedded
           arjs="sourceType: webcam; debugUIEnabled: false; patternRatio: 0.7;"
           dynamic-beam>

    <!-- LIGHT (balanced, not too harsh) -->
    <a-entity light="type: ambient; intensity: 0.6;"></a-entity>
    <a-entity light="type: directional; intensity: 0.8;" position="1 4 2"></a-entity>
    <a-entity light="type: directional; intensity: 0.4;" position="-2 3 -1"></a-entity>

    <!-- MARKER 1 -->
    <a-marker id="marker-illum" type="pattern" url="pattern-illum.patt">
      <a-box color="  #850909" scale="0.2 0.2 0.2"></a-box>
    </a-marker>

    <!-- MARKER 2 -->
    <a-marker id="marker-flow" type="pattern" url="pattern-flow.patt">
      <a-box color="#750808" scale="0.2 0.2 0.2"></a-box>
    </a-marker>

    <!-- GLB BEAM -->
    <a-entity id="beam"
              gltf-model="url(beam.glb)"
              scale="0.01 0.01 0.01"
              visible="false">
    </a-entity>

    <a-entity camera></a-entity>
  </a-scene>
</body>
</html>
