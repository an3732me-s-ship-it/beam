<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Beam Test</title>

  <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>

<body style="margin:0; overflow:hidden;">
  <a-scene embedded 
           arjs="sourceType: webcam; debugUIEnabled: false;">

    <!-- LIGHT (important for GLB visibility) -->
    <a-entity light="type: ambient; intensity: 1.0;"></a-entity>
    <a-entity light="type: directional; intensity: 1.0;" position="1 2 1"></a-entity>

    <!-- FLOW MARKER -->
    <a-marker type="pattern" url="pattern-flow.patt">

      <!-- BEAM MODEL -->
      <a-entity 
        gltf-model="url(beam.glb)"
        scale="100 100 100"
        position="0 0 0"
        rotation="0 0 0">
      </a-entity>

      <a-box color="red" scale="0.2 0.2 0.2"></a-box>

    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>
</body>
</html>
