<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>GLB TEST</title>

  <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>

<body style="margin:0; overflow:hidden;">
  <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">

    <!-- LIGHT (important for GLB visibility) -->
    <a-entity light="type: ambient; intensity: 1"></a-entity>
    <a-entity light="type: directional; intensity: 1.5" position="2 4 2"></a-entity>

    <!-- MARKER -->
    <a-marker type="pattern" url="pattern-flow.patt">

      <!-- RED BOX (reference) -->
      <a-box position="0 0 0"
             scale="1 1 1"
             color="red">
      </a-box>

      <!-- BEAM GLB -->
      <a-entity 
        gltf-model="url(beam.glb)"
        position="0 0 0"
        scale="12 12 12"
        rotation="0 0 0">
      </a-entity>

    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>
</body>
</html>
