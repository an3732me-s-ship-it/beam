<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>AR Beam Stable</title>

  <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <script>
    AFRAME.registerComponent('dynamic-beam', {
      init: function () {
        this.p1 = new THREE.Vector3();
        this.p2 = new THREE.Vector3();
        this.mid = new THREE.Vector3();
      },

      tick: function () {
        const m1 = document.querySelector('#marker-illum');
        const m2 = document.querySelector('#marker-flow');
        const beam = document.querySelector('#beam');

        if (!m1 || !m2 || !beam) return;

        if (m1.object3D.visible && m2.object3D.visible) {

          // --- GET POSITIONS ---
          m1.object3D.getWorldPosition(this.p1);
          m2.object3D.getWorldPosition(this.p2);

          const distance = this.p1.distanceTo(this.p2);

          // --- POSITION (MIDPOINT) ---
          this.mid.addVectors(this.p1, this.p2).multiplyScalar(0.5);
          beam.object3D.position.copy(this.mid);

          // --- ROTATION ---
          beam.object3D.lookAt(this.p2);

          // 🔴 IMPORTANT: flip if beam points wrong way
          beam.object3D.rotation.y += Math.PI;

          // --- SCALE ---
          const baseLength = 0.10; // your 10 cm model

          const lengthScale = distance / baseLength;

          // keep thickness constant (clean + readable)
          const thickness = 0.04;

          beam.object3D.scale.set(
            thickness,
            thickness,
            lengthScale
          );

          beam.object3D.visible = true;

        } else {
          beam.object3D.visible = false;
        }
      }
    });

    // --- MATERIAL FIX ---
    AFRAME.registerComponent('fix-material', {
      init: function () {
        this.el.addEventListener('model-loaded', () => {
          const mesh = this.el.getObject3D('mesh');
          if (!mesh) return;

          mesh.traverse((node) => {
            if (node.isMesh) {
              node.material.color.set('#8db396');
              node.material.roughness = 0.6;
              node.material.metalness = 0.1;

              // slight emissive for visibility
              node.material.emissive = new THREE.Color('#8db396');
              node.material.emissiveIntensity = 0.2;
            }
          });
        });
      }
    });
  </script>
</head>

<body style="margin:0; overflow:hidden;">
  <a-scene embedded
           arjs="sourceType: webcam; debugUIEnabled: false; patternRatio: 0.7;"
           dynamic-beam>

    <!-- LIGHT -->
    <a-entity light="type: ambient; intensity: 1;"></a-entity>

    <!-- MARKER 1 -->
    <a-marker id="marker-illum" type="pattern" url="pattern-illum.patt">
      <a-box color="red" scale="0.2 0.2 0.2"></a-box>
    </a-marker>

    <!-- MARKER 2 -->
    <a-marker id="marker-flow" type="pattern" url="pattern-flow.patt">
      <a-box color="red" scale="0.2 0.2 0.2"></a-box>
    </a-marker>

    <!-- BEAM -->
    <a-entity id="beam"
              gltf-model="url(beam_w.glb)"
              fix-material
              visible="false">
    </a-entity>

    <a-entity camera></a-entity>
  </a-scene>
</body>
</html>
